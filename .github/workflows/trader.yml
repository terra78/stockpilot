name: Stock Trader

# Triggered by external cron service via GitHub API (workflow_dispatch)
# POST https://api.github.com/repos/terra78/stockpilot/actions/workflows/trader.yml/dispatches
# Body: {"ref":"master"}

on:
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trader
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRADE_SYMBOLS: ${{ vars.TRADE_SYMBOLS }}
          MAX_POSITION_RATIO: ${{ vars.MAX_POSITION_RATIO }}
          MAX_DAILY_LOSS_USD: ${{ vars.MAX_DAILY_LOSS_USD }}
          STOP_LOSS_PERCENT: ${{ vars.STOP_LOSS_PERCENT }}
        run: python scripts/run_trader.py
